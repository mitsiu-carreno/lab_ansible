---
- name: Determine tljh user-env python site-packages directory
  ansible.builtin.command:
    cmd: /opt/tljh/user/bin/python3 -c "import site; print(site.getsitepackages()[0])"
  register: tljh_user_site_packages
  changed_when: false

- name: Deploy trash contents manager
  ansible.builtin.template:
    src: trashmanager.py.j2
    dest: "{{ tljh_user_site_packages.stdout }}/trashmanager.py"
    owner: root
    group: root
    mode: "0644"

- name: Ensure /etc/jupyter directory exists
  ansible.builtin.file:
    path: /etc/jupyter
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy jupyter_server_config.py
  ansible.builtin.template:
    src: jupyter_server_config.py.j2
    dest: /etc/jupyter/jupyter_server_config.py
    owner: root
    group: root
    mode: "0644"
