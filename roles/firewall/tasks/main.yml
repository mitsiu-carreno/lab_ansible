---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Set UFW default incoming policy to deny
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set UFW default outgoing policyt to allow
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: "433"
    proto: tcp

- name: Allow TCP port range for tljh
  community.general.ufw:
    rule: allow
    port: "{{ ufw_extra_tcp_range_start }}:{{ ufw_extra_tcp_range_end }}"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled

